apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-gateway
  namespace: payments
  labels:
    app: payment-gateway
    tier: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-gateway
  template:
    metadata:
      labels:
        app: payment-gateway
        tier: gateway
    spec:
      containers:
        - name: payment-gateway
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: payment-gateway
  namespace: payments
  labels:
    app: payment-gateway
spec:
  selector:
    app: payment-gateway
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
