# payment-service: HEALTHY version — has DATABASE_URL set
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: hackathon
  labels:
    app: payment-service
    tier: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: service
    spec:
      containers:
        - name: payment-service
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "payment-service: Connected to database"
              while true; do sleep 60; echo "heartbeat"; done
          env:
            - name: DATABASE_URL
              value: "postgres://user:pass@redis.hackathon.svc.cluster.local:5432/payments"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: hackathon
spec:
  selector:
    app: payment-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
