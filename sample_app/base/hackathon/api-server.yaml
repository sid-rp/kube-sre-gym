# api-server: HEALTHY version
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: hackathon
  labels:
    app: api-server
    tier: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        tier: api
    spec:
      containers:
        - name: api-server
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "api-server v3.0.0 starting..."
              echo "Model registry loaded successfully"
              while true; do sleep 60; echo "heartbeat"; done
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: hackathon
spec:
  selector:
    app: api-server
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
