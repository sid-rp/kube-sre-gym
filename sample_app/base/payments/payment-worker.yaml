# payment-worker: HEALTHY version — has DATABASE_URL set correctly
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-worker
  namespace: payments
  labels:
    app: payment-worker
    tier: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-worker
  template:
    metadata:
      labels:
        app: payment-worker
        tier: worker
    spec:
      containers:
        - name: payment-worker
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -z "$DATABASE_URL" ]; then
                echo "FATAL: DATABASE_URL not set"
                exit 1
              fi
              echo "Worker connected to $DATABASE_URL, processing payments..."
              while true; do sleep 60; echo "heartbeat"; done
          env:
            - name: DATABASE_URL
              value: "postgres://payments_user:payments_pass@payment-db.payments.svc.cluster.local:5432/payments"
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
