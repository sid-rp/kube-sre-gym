apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-cache
  namespace: frontend
  labels:
    app: frontend-cache
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-cache
  template:
    metadata:
      labels:
        app: frontend-cache
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-cache
  namespace: frontend
  labels:
    app: frontend-cache
spec:
  selector:
    app: frontend-cache
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  type: ClusterIP
