# api-gateway: Liveness probe on wrong port — pod keeps restarting
# nginx listens on 80, but liveness probe checks 8080
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: hackathon
  labels:
    app: api-gateway
    tier: gateway
    scenario: complex
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        tier: gateway
        scenario: complex
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # BUG: liveness probe on wrong port (8080 instead of 80)
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: hackathon
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
