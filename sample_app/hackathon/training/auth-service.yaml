# auth-service (hackathon): healthy nginx
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: hackathon
  labels:
    app: auth-service
    tier: service
    scenario: training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
        tier: service
        scenario: training
    spec:
      containers:
        - name: auth-service
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: hackathon
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
