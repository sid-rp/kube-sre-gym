# api-server: CrashLoopBackOff — incompatible model version error
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: hackathon
  labels:
    app: api-server
    tier: api
    scenario: training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
        tier: api
        scenario: training
    spec:
      containers:
        - name: api-server
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "api-server v2.3.1 starting..."
              echo "Loading model registry..."
              sleep 2
              echo "RuntimeError: incompatible model version — expected v3.x, got v2.1"
              exit 1
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-server
  namespace: hackathon
  labels:
    app: api-server
spec:
  selector:
    app: api-server
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
