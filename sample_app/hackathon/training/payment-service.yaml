# payment-service (hackathon): CrashLoopBackOff — missing DATABASE_URL
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: hackathon
  labels:
    app: payment-service
    tier: service
    scenario: training
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        tier: service
        scenario: training
    spec:
      containers:
        - name: payment-service
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "payment-service: Starting up..."
              if [ -z "$DATABASE_URL" ]; then
                echo "FATAL: DATABASE_URL not set — cannot connect to payment database"
                exit 1
              fi
              echo "payment-service: Connected, processing transactions..."
              sleep 3600
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: hackathon
  labels:
    app: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
