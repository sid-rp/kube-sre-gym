# eval-liveness: Bad liveness probe — httpGet /healthz on port 8080, but nginx listens on 80
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eval-liveness
  namespace: hackathon
  labels:
    app: eval-liveness
    tier: eval
    scenario: eval
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eval-liveness
  template:
    metadata:
      labels:
        app: eval-liveness
        tier: eval
        scenario: eval
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          # BUG: liveness probe checks port 8080 but nginx serves on port 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
